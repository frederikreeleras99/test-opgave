name: Python Status Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Denne kommando tjekker om app.py kan kompileres uden at køre den i uendelighed
      - name: Check syntax in app.py
        run: python -m py_compile app.py

      # Hvis det IKKE er en web-app, men et script der afslutter sig selv, 
      # kan du bruge denne linje i stedet:
      - name: Run app.py
        run: python app.py